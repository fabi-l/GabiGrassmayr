<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gabriel Grassmayr | Portfolio</title>
    <meta
      name="description"
      content="Cinematic filmmaker portfolio focused on extreme sports and travel content."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:ital,wght@1,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-shell">
        <button
          class="menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          aria-label="Open navigation menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
          <a href="#hero">Home</a>
          <a href="#worked-with">Work</a>
          <a href="#contact">Contact</a>
        </nav>

        <a class="brand" href="#hero" aria-label="Gabriel Grassmayr home">
          <img src="GabrielG.png" alt="Gabriel Grassmayr logo" />
        </a>
      </div>
    </header>

    <main>
      <section class="hero" id="hero" aria-label="Hero">
        <video
          class="hero-video"
          autoplay
          muted
          loop
          playsinline
          webkit-playsinline
          preload="auto"
        >
          <source src="VulkanSlomo-hero.mp4" type="video/mp4" />
        </video>

        <div class="hero-overlay" aria-hidden="true"></div>

        <div class="hero-content container">
          <p class="hero-kicker">Gabriel Grassmayr</p>
          <h1 aria-label="Capturing The Impossible">
            <span class="hero-line hero-line-top">
              <span class="hero-line-static">Capturing</span>
              <span class="hero-line-typed">Capturing</span>
            </span>
            <span class="hero-line hero-line-bottom">
              <span class="hero-line-static">The Impossible</span>
              <span class="hero-line-typed">The Impossible</span>
            </span>
          </h1>
          <p class="hero-subheadline" aria-label="SPECIALIZED IN EXTREME SPORTS AND TRAVEL CONTENT">
            <span>SPECIALIZED IN EXTREME SPORTS</span>
            <span>AND TRAVEL CONTENT</span>
          </p>
          <div class="hero-social" id="contact" aria-label="Social links">
            <a
              class="social-link"
              href="https://www.linkedin.com/in/gabrielgrassmayr/"
              target="_blank"
              rel="noreferrer"
              aria-label="LinkedIn"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M6.94 8.5A1.56 1.56 0 1 1 6.93 5.4a1.56 1.56 0 0 1 .01 3.11ZM5.6 9.68h2.67V18H5.6V9.68Zm4.34 0h2.56v1.14h.04c.36-.68 1.23-1.4 2.53-1.4 2.71 0 3.21 1.78 3.21 4.1V18H15.6v-3.98c0-.95-.02-2.17-1.32-2.17-1.33 0-1.53 1.04-1.53 2.1V18H9.94V9.68Z"
                  fill="currentColor"
                />
              </svg>
            </a>
            <a
              class="social-link"
              href="https://www.instagram.com/gabrielgrassmayr"
              target="_blank"
              rel="noreferrer"
              aria-label="Instagram"
            >
              <img
                src="https://cdn.simpleicons.org/instagram/262626?viewbox=auto"
                alt=""
                aria-hidden="true"
                decoding="async"
              />
            </a>
            <a
              class="social-link"
              href="https://www.tiktok.com/@gabrielgrassmayr"
              target="_blank"
              rel="noreferrer"
              aria-label="TikTok"
            >
              <img
                src="https://cdn.simpleicons.org/tiktok/262626?viewbox=auto"
                alt=""
                aria-hidden="true"
                decoding="async"
              />
            </a>
            <a
              class="social-link"
              href="mailto:Gabrielgrassmayr@icloud.com"
              aria-label="Email"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 6.75A1.75 1.75 0 0 1 4.75 5h14.5A1.75 1.75 0 0 1 21 6.75v10.5A1.75 1.75 0 0 1 19.25 19H4.75A1.75 1.75 0 0 1 3 17.25V6.75Zm1.9.08 7.1 5.24 7.1-5.24H4.9Zm14.35 10.42a.2.2 0 0 0 .2-.2V8.41l-6.86 5.06a1 1 0 0 1-1.18 0L4.55 8.41v8.64c0 .11.09.2.2.2h14.5Z"
                  fill="currentColor"
                />
              </svg>
            </a>
          </div>
        </div>
      </section>

      <section class="worked-with" id="worked-with" aria-labelledby="worked-with-title">
        <div class="container">
          <h2 id="worked-with-title">Worked With</h2>
          <div class="logo-panel">
            <!-- Swap the classes or labels below later if you want to replace individual logo entries. -->
            <div class="logo-grid" aria-label="Worked with brands">
              <figure class="logo-item logo-item-redbull">
                <div class="logo-inner">
                  <img class="logo-image" src="red-bull.svg" alt="Red Bull logo" />
                </div>
              </figure>
              <figure class="logo-item logo-item-ama">
                <div class="logo-inner">
                  <img class="logo-image" src="ama-guetesiegel.svg" alt="AMA Guetesiegel logo" />
                </div>
              </figure>
              <figure class="logo-item logo-item-bk">
                <div class="logo-inner">
                  <img class="logo-image" src="bk.svg" alt="BK logo" />
                </div>
              </figure>
              <figure class="logo-item logo-item-ard">
                <div class="logo-inner">
                  <img class="logo-image" src="ard1.svg" alt="ARD 1 logo" />
                </div>
              </figure>
              <figure class="logo-item logo-item-innsbruck">
                <div class="logo-inner">
                  <img class="logo-image" src="innsbruck.svg" alt="Innsbruck logo" />
                </div>
              </figure>
              <figure class="logo-item logo-item-landjugend">
                <div class="logo-inner">
                  <img class="logo-image" src="landjugend.svg" alt="Landjugend logo" />
                </div>
              </figure>
              <figure class="logo-item logo-item-yepp">
                <div class="logo-inner">
                  <img class="logo-image" src="yepp.svg" alt="Yepp logo" />
                </div>
              </figure>
              <figure class="logo-item logo-item-ripple">
                <div class="logo-inner">
                  <img class="logo-image" src="ripple.svg" alt="Ripple logo" />
                </div>
              </figure>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
