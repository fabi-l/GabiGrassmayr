<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gabriel Grassmayr | Portfolio</title>
    <meta
      name="description"
      content="Cinematic filmmaker portfolio focused on extreme sports and travel content."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:ital,wght@1,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-shell">
        <button
          class="menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          aria-label="Open navigation menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
          <a href="#hero">Home</a>
          <a href="#worked-with">Work</a>
          <a href="#contact">Contact</a>
        </nav>

        <a class="brand" href="#hero" aria-label="Gabriel Grassmayr home">
          <img src="GabrielG.png" alt="Gabriel Grassmayr logo" />
        </a>
      </div>
    </header>

    <main>
      <section class="hero" id="hero" aria-label="Hero">
        <video
          class="hero-video"
          autoplay
          muted
          loop
          playsinline
          webkit-playsinline
          preload="auto"
        >
          <source src="VulkanSlomo-hero.mp4" type="video/mp4" />
        </video>

        <div class="hero-overlay" aria-hidden="true"></div>

        <div class="hero-content container">
          <p class="hero-kicker">Gabriel Grassmayr</p>
          <h1 aria-label="Capturing The Impossible">
            <span class="hero-line hero-line-top">Capturing</span>
            <span class="hero-line hero-line-bottom">The Impossible</span>
            <span class="hero-caret" aria-hidden="true"></span>
          </h1>
          <p class="hero-subheadline" aria-label="SPECIALIZED IN EXTREME SPORTS AND TRAVEL CONTENT">
            <span>SPECIALIZED IN EXTREME SPORTS</span>
            <span>AND TRAVEL CONTENT</span>
          </p>
        </div>
      </section>

      <section class="worked-with" id="worked-with" aria-labelledby="worked-with-title">
        <div class="container">
          <h2 id="worked-with-title">Worked With</h2>
          <!-- Swap the classes or labels below later if you want to replace individual logo entries. -->
          <div class="logo-grid" aria-label="Worked with brands">
            <figure class="logo-item">
              <svg class="logo-svg" viewBox="50 170 700 300" aria-hidden="true">
                <image href="worked-with-logos-white.svg" width="3030" height="1270" preserveAspectRatio="xMidYMid meet" />
              </svg>
              <figcaption>Red Bull</figcaption>
            </figure>
            <figure class="logo-item">
              <svg class="logo-svg" viewBox="790 150 720 320" aria-hidden="true">
                <image href="worked-with-logos-white.svg" width="3030" height="1270" preserveAspectRatio="xMidYMid meet" />
              </svg>
              <figcaption>AMA Guetesiegel</figcaption>
            </figure>
            <figure class="logo-item">
              <svg class="logo-svg" viewBox="1540 140 700 320" aria-hidden="true">
                <image href="worked-with-logos-white.svg" width="3030" height="1270" preserveAspectRatio="xMidYMid meet" />
              </svg>
              <figcaption>BK</figcaption>
            </figure>
            <figure class="logo-item">
              <svg class="logo-svg" viewBox="2250 160 720 300" aria-hidden="true">
                <image href="worked-with-logos-white.svg" width="3030" height="1270" preserveAspectRatio="xMidYMid meet" />
              </svg>
              <figcaption>ARD 1</figcaption>
            </figure>
            <figure class="logo-item">
              <svg class="logo-svg" viewBox="40 700 700 360" aria-hidden="true">
                <image href="worked-with-logos-white.svg" width="3030" height="1270" preserveAspectRatio="xMidYMid meet" />
              </svg>
              <figcaption>Innsbruck</figcaption>
            </figure>
            <figure class="logo-item">
              <svg class="logo-svg" viewBox="730 650 860 420" aria-hidden="true">
                <image href="worked-with-logos-white.svg" width="3030" height="1270" preserveAspectRatio="xMidYMid meet" />
              </svg>
              <figcaption>Landjugend</figcaption>
            </figure>
            <figure class="logo-item">
              <svg class="logo-svg" viewBox="1490 720 720 260" aria-hidden="true">
                <image href="worked-with-logos-white.svg" width="3030" height="1270" preserveAspectRatio="xMidYMid meet" />
              </svg>
              <figcaption>Yepp</figcaption>
            </figure>
            <figure class="logo-item">
              <svg class="logo-svg" viewBox="2170 700 760 320" aria-hidden="true">
                <image href="worked-with-logos-white.svg" width="3030" height="1270" preserveAspectRatio="xMidYMid meet" />
              </svg>
              <figcaption>Ripple</figcaption>
            </figure>
          </div>
        </div>
      </section>
    </main>

    <div id="contact" hidden></div>

    <script src="script.js"></script>
  </body>
</html>
